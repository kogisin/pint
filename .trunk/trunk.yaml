version: 0.1
cli:
  version: 1.25.0
plugins:
  sources:
    - id: trunk
      ref: v1.10.2
      uri: https://github.com/trunk-io/plugins
lint:
  enabled:
    - checkov@3.3.2
    - osv-scanner@2.4.0
    - oxipng@10.1.1
    - trivy@0.71.2
    - trufflehog@3.95.6
    - actionlint@1.7.12
    - git-diff-check
    - markdownlint@0.49.0
    - prettier@3.9.1
    - rustfmt@1.84.1
    - taplo@0.10.0
    - yamllint@1.38.0
runtimes:
  enabled:
    - go@1.21.0
    - node@22.16.0
    - python@3.14.4
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
